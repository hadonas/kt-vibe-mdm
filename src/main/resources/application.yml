spring:
  application:
    name: mdm
  
  data:
    mongodb:
      uri: mongodb://admin:password@mongodb:27017/mdm?authSource=admin
      database: mdm
  
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}
  
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api

# Management/Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    elasticsearch:
      enabled: false  # Elasticsearch health check 비활성화
    defaults:
      enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:mySecretKey}
  expiration: 86400000 # 24 hours
  issuer: ${JWT_ISSUER:app.local}

# Application Configuration
app:
  file:
    storage:
      path: ${FILE_STORAGE_PATH:/app/storage}
    temp:
      path: ${FILE_TEMP_PATH:/app/temp}

# Elasticsearch Configuration
elasticsearch:
  host: ${ELASTICSEARCH_HOST:elasticsearch}
  port: ${ELASTICSEARCH_PORT:9200}
  scheme: ${ELASTICSEARCH_SCHEME:http}
  connect-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:5000}
  socket-timeout: ${ELASTICSEARCH_SOCKET_TIMEOUT:30000}

# MongoDB Vector Search
atlas:
  vector:
    index:
      purpose: ${ATLAS_VECTOR_INDEX_PURPOSE:purpose_idx}

# Similarity Search
similarity:
  threshold: ${SIM_THRESHOLD:0.82}
  topk:
    default: ${TOPK_DEFAULT:5}

# Vector Sharding
vector:
  shard:
    count: ${VECTOR_SHARD_COUNT:4}
  search:
    fanout: ${VECTOR_SEARCH_FANOUT:1}
    min-sufficient-ratio: ${VECTOR_SEARCH_MIN_SUFFICIENT_RATIO:0.5}

# File Processing
file:
  tmp-dir: ${TMP_DIR:/tmp/mdm}
  exclude-globs: ${EXCLUDE_GLOBS:node_modules/**,dist/**,build/**,*.bin,*.zip,*.jar}
  max-archive-size-mb: ${MAX_ARCHIVE_SIZE_MB:50}

# AI Services
ai:
  embedding:
    api-base: ${EMBEDDING_API_BASE:http://localhost:11434}
    model: ${EMBEDDING_MODEL:text-embed-3}
  llm:
    api-base: ${LLM_API_BASE:http://localhost:11434}
    model: ${LLM_MODEL:llama3.2}

# LLM API Configuration
llm:
  api:
    key: ${AI_API_KEY:sk-test-key}
    base: ${LLM_API_BASE:https://api.openai.com/v1}
  model: ${LLM_MODEL:gpt-5-mini}

# Smart Classification Configuration
classification:
  candidate-count: ${CLASSIFICATION_CANDIDATE_COUNT:5}
  confidence-threshold: ${CLASSIFICATION_CONFIDENCE_THRESHOLD:0.8}
  bm25-weight: ${CLASSIFICATION_BM25_WEIGHT:0.3}
  vector-weight: ${CLASSIFICATION_VECTOR_WEIGHT:0.7}

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
    docExpansion: none
    persistAuthorization: true

# Logging
logging:
  level:
    com.company.app: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.filter: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  semantic-chunk:
    enabled: ${SEMANTIC_CHUNK_ENABLED:true}
    migrate-on-start: ${SEMANTIC_CHUNK_MIGRATE_ON_START:false}
